name: .NET CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/dotnet-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/dotnet-ci.yml"

jobs:
  suppression-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for static analysis suppression comments
        shell: bash
        run: |
          PATTERNS=(
            "#pragma warning disable"
            "#pragma warning restore"
            "SuppressMessage"
            "pyright: ignore"
            "type: ignore"
            "# noqa"
            "pylint: disable"
            "// @ts-ignore"
            "// @ts-nocheck"
            "eslint-disable"
            "prettier-ignore"
            "// eslint-disable-next-line"
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn "$pattern" --include="*.cs" --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" src/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Suppression comment '$pattern' found:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -ne 0 ]; then
            echo ""
            echo "❌ Static analysis suppression comments detected."
            echo "Do not suppress lint/type errors. Fix the root cause instead."
            exit 1
          fi
          echo "✅ No suppression comments found."

  build:
    needs: suppression-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore AmeCapture.slnx

      - name: Build
        run: dotnet build src/AmeCapture.App/AmeCapture.App.csproj -f net10.0-windows10.0.19041.0 --no-restore -warnaserror

  test:
    needs: suppression-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/AmeCapture.Tests/AmeCapture.Tests.csproj

      - name: Build tests
        run: dotnet build tests/AmeCapture.Tests/AmeCapture.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test tests/AmeCapture.Tests/AmeCapture.Tests.csproj --no-build --verbosity normal

  lint:
    needs: suppression-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore AmeCapture.slnx

      - name: Install dotnet-format
        run: dotnet tool install --global dotnet-format

      - name: Check formatting
        run: dotnet format AmeCapture.slnx --verify-no-changes --severity warn
